<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>작업내역</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 10px;
      }
      body {
        padding: 2vw;
      }
      .markupGuide {
        display: flex;
        flex-direction: column;
      }
      .markupGuide li {
        border-bottom: 1px solid #ddd;
        display: grid;
        grid-template-columns: 0.5fr 1fr 30% 2fr;
      }
      .markupGuide > li > div {
        border-right: 1px solid #ddd;
        padding: 1rem;
        font-size: 1.4rem;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        word-break: break-all;
      }
      .markupGuide > li > div.is-first {
        border-left: 1px solid #ddd;
      }
      .markupGuide .head > div {
        background: #f4f4f4;
        justify-content: center;
        border-top: 1px solid #ddd;
      }

      .historyList {
        display: flex;
        flex-direction: column;
        margin-top: 3rem;
      }
      .historyList h2 {
        margin-bottom: 2rem;
      }

      .historyList li {
        border-bottom: 1px solid #ddd;
        display: grid;
        grid-template-columns: 0.5fr 5fr;
      }
      .historyList > li > div {
        border-right: 1px solid #ddd;
        padding: 1rem;
        font-size: 1.4rem;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        word-break: break-all;
      }
      .historyList > li > div.is-first {
        border-left: 1px solid #ddd;
      }
      .historyList .head > div {
        background: #f4f4f4;
        justify-content: center;
        border-top: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div>
      <ul class="markupGuide">
        <li>
          <div></div>
          <div>약검색(데이터 있음)</div>
          <div>
            <a target="_blank" href="publish/page/GH-MORE-022-3.html"> GH-MORE-022-3.html </a>
          </div>
          <div>QA</div>
        </li>
      </ul>
    </div>
  </body>
</html>
