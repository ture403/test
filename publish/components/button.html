<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>Button</title>

        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <style>
            .btn-full {
                padding: 2rem;
                display: flex;
                flex-direction: column;
                gap: 1rem;
                justify-content: center;
                align-items: center;
                max-width: 50rem;
                margin: 0 auto;
            }
        </style>
    </head>
    <body>
        <div class="btn-full">
            <div class="switch-tab-group">
                <button class="switch-tab active" onclick="switchTab(0)">
                    탭1
                </button>
                <button class="switch-tab" onclick="switchTab(1)">탭2</button>
            </div>

            <button type="button" class="btn-bor btn-md">
                <span>button</span>
            </button>
            <button type="button" class="btn-bor btn-sm">
                <span>button</span>
                <i class="ico-arr"></i>
            </button>
            <button type="button" class="btn-bor btn-ss">
                <span>button</span>
            </button>
            <button type="button" class="btn-bor">
                <i class="ico-refresh"></i>
                <span>button</span>
            </button>
            <button type="button" class="btn-bor">button</button>
            <button type="button" class="btn-bor">
                <i class="ico-plus"></i>
                <strong>button</strong>
            </button>
            <!-- 로그아웃 버튼추가 -->
            <button type="button" class="btn-bor soft">
                <i class="ico-m-logout"></i>
                button
            </button>
            <button type="button" class="btn-fill hc1">
                <i class="ico-plus"></i>
                <strong>button</strong>
            </button>
            <button type="button" class="btn-fill hc1">
                <i class="ico-refresh"></i>
                <strong>button</strong>
            </button>
            <button type="button" class="btn-fill">
                <i class="ico-plus"></i>
                <strong>button</strong>
            </button>
            <button type="button" class="btn-bor">
                <span>button</span>
                <i class="ico-arr-down"></i>
            </button>
            <button type="button" class="btn-fill">
                <strong>button</strong>
            </button>
            <button type="button" class="btn-fill">
                <span>더보기</span>
                <i class="ico-arr-down"></i>
            </button>
            <button type="button" class="btn-fill btn-primary">
                <strong>button</strong>
            </button>
            <button type="button" class="btn-fill btn-negative">
                <strong>button</strong>
            </button>
            <button type="button" class="btn-fill btn-disabled">
                <strong>button</strong>
            </button>
            <!-- 라인없는 버튼 -->
            <button type="button" class="btn-bor no-bor">
                <strong>button</strong>
            </button>
            <div class="btn-group">
                <button type="button" class="btn-bor"><span>취소</span></button>
                <button type="button" class="btn-fill btn-negative">
                    <strong>삭제</strong>
                </button>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-bor"><span>취소</span></button>
                <button type="button" class="btn-fill btn-primary">
                    <strong>저장</strong>
                </button>
            </div>
        </div>

        <script>
            function switchTab(index) {
                const tabs = document.querySelectorAll(".switch-tab");
                tabs.forEach((tab, i) => {
                    if (i === index) {
                        tab.classList.add("active");
                    } else {
                        tab.classList.remove("active");
                    }
                });
            }
        </script>
    </body>
</html>
