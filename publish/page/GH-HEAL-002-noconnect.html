<!doctype html>

        <link rel="stylesheet" href="../../assets/styles/style.css" />

    <body>

                            </div>
                        </div>
                        <div class="connect-btn-wrap is-wide">

                    </div>
                    <div class="card-data-list">
                        <div class="headth-data-tit">
                            <div class="headth-data-ht">
                                <i class="ht-weigth"></i>
                                <div class="ht-info">
                                    <span class="text-b-lg-sb">몸무게</span>
                                    <span class="text-c-lg-m">지난 4주</span>
                                </div>
                            </div>
                            <div class="headth-data-tit-r">
                                <div class="text-c-lg-m">18시간 전</div>
                                <div class="num">
                                    <strong>-</strong>
                                    <span>kg</span>
                                </div>
                            </div>
                        </div>
                        <div class="connect-btn-wrap is-wide">
                            <button type="button" class="btn-fill">
                                <i class="ico-edit"></i>
                                몸무게 기록하기
                            </button>
                        </div>
                    </div>
                    <div class="card-data-list">
                        <div class="headth-data-tit">
                            <div class="headth-data-ht">
                                <i class="ht-work"></i>
                                <div class="ht-info">
                                    <span class="text-b-lg-sb">운동</span>
                                    <span class="text-c-lg-m">지난 4주</span>
                                </div>
                            </div>
                            <div class="headth-data-tit-r">
                                <div class="text-c-lg-m">하루 평균</div>
                                <div class="num">
                                    <strong>-</strong>
                                    <span>분</span>
                                </div>
                            </div>
                        </div>
                        <div class="connect-btn-wrap">
                            <button type="button" class="btn-fill">
                                <i class="ico-edit"></i>
                                운동 기록하기
                            </button>
                        </div>
                    </div>
                    <div class="card-data-list">
                        <div class="headth-data-tit">
                            <div class="headth-data-ht">
                                <i class="ht-blood"></i>
                                <div class="ht-info">

                                    <span class="text-c-lg-m">오늘</span>

                            </div>
                        </div>
                        <div class="connect-btn-wrap">
                            <button type="button" class="btn-fill">
                                <i class="ico-edit"></i>
                                혈압 기록하기
                            </button>
                        </div>
                    </div>
                    <div class="card-data-list">
                        <div class="headth-data-tit">
                            <div class="headth-data-ht">
                                <i class="ht-icn"></i>
                                <div class="ht-info">
                                    <span class="text-b-lg-sb">혈당</span>
                                    <span class="text-c-lg-m">지난 4주</span>
                                </div>
                            </div>
                        </div>
                        <div class="connect-btn-wrap">
                            <button type="button" class="btn-fill">
                                <i class="ico-edit"></i>

                    </div>
                    <div class="card-data-list">
                        <div class="headth-data-tit">
                            <div class="headth-data-ht">
                                <i class="ht-heart"></i>
                                <div class="ht-info">
                                    <span class="text-b-lg-sb">심박수</span>
                                    <span class="text-c-lg-m">오늘</span>
                                </div>
                            </div>
                            <div class="headth-data-tit-r">
                                <div class="text-c-lg-m">오늘</div>
                                <div class="num">
                                    <strong>-</strong>
                                    <span>bpm</span>
                                </div>
                            </div>
                        </div>
                        <div class="connect-btn-wrap is-wide">
                            <button type="button" class="btn-fill">

                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
