                            <div class="icon">

                            <div class="info">

        </div>
         <!-- 적립금 교환 모달 -->
         <div class="modal-overlay modal-bottom" id="modalBottom">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">적립금으로 교환</h2>
                    <button
                        class="modal-close"
                        onclick="closeModal('modalBottom')"
                    >
                        <i class="ico-x"></i>
                        <span class="sr-only">닫기</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="gem-exchange">
                        <div class="point-num-wrap">
                            <div class="point-num-box">
                                <div class="text-b-sm-m">
                                    현재 보유잼
                                </div>
                                <div class="point-detail">
                                    <i class="ico-gem"></i>
                                    +40,000
                                </div>
                            </div>
                        </div>
                        <div class="input-cell">
                            <div class="input-group">
                                <input
                                    type="text"
                                    class="input"
                                    placeholder="교환할 젬을 입력해주세요"
                                />
                                <span class="unit">젬</span>
                            </div>
                        </div>
                    </div>
                    <div class="bottom-button-fixed">
                        <button type="button" class="btn-fill btn-disabled">
                            교환하기
                        </button>
                        <button type="button" class="btn-fill btn-primary" onclick="closeModal('modalBottom')">
                            교환하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
