<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>가져오기 랜딩2</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <div class="common-wrap">
            <header>
                <div class="top-header-nav">
                    <button type="button" class="btn-back">
                        <i class="ico-back"></i>
                        <span class="sr-only">이전</span>
                    </button>
                </div>
            </header>
            <div class="sub-wrap has-header">
                <div class="randing-wrap">
                    <div class="line-step-wrapper">
                        <div class="line-step"></div>
                        <div class="line-step is-active"></div>
                        <div class="line-step"></div>
                        <div class="line-step"></div>
                    </div>

                    <div class="title-type__sub">
                        <h3 class="text-h5">간편 인증 수단을 선택해주세요</h3>
                        <p class="text-b-sm-r">
                            자주 사용하시는 인증 앱(카카오톡, 네이버 등)을
                            설치하시고 인증서를 발급받으셔야 간편인증이 가능해요
                        </p>
                    </div>
                    <div class="auth-wrapper">
                        <div class="auth-item is-selected">
                            <div class="auth-item-title">
                                <i class="ico-kakao"></i>
                                <div class="auth-name">카카오톡</div>
                            </div>
                            <div class="auth-item-desc">
                                <p class="desc-title">인증서 발급 방법</p>
                                <p class="desc-text">
                                    카카오톡 실행 후 하단 ‘더보기' 메뉴에서 지갑
                                    또는 인증서를 눌러주세요
                                </p>
                            </div>
                        </div>
                        <div class="auth-toggle-section">
                            <div class="auth-item-lists">
                                <div class="auth-item">
                                    <div class="auth-item-title">
                                        <i class="ico-naver"></i>
                                        <div class="auth-name">네이버</div>
                                    </div>
                                </div>
                                <div class="auth-item">
                                    <div class="auth-item-title">
                                        <i class="ico-pass"></i>
                                        <div class="auth-name">통신사 PASS</div>
                                    </div>
                                </div>
                                <div class="auth-item">
                                    <div class="auth-item-title">
                                        <i class="ico-samsung-pass"></i>
                                        <div class="auth-name">삼성 PASS</div>
                                    </div>
                                </div>
                                <div class="auth-item">
                                    <div class="auth-item-title">
                                        <i class="ico-payco"></i>
                                        <div class="auth-name">페이코</div>
                                    </div>
                                </div>
                                <div class="auth-item">
                                    <div class="auth-item-title">
                                        <i class="ico-kb"></i>
                                        <div class="auth-name">KB 모바일</div>
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn-auth-toggle">
                                다른 인증수단
                                <i class="ico-arr-gr"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bottom-button-fixed">
                <button type="button" class="btn-fill btn-primary">
                    <strong>다음</strong>
                </button>
            </div>
        </div>

        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
