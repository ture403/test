<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>가져오기 랜딩3</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <div class="common-wrap">
            <header>
                <div class="top-header-nav">
                    <button type="button" class="btn-back">
                        <i class="ico-back"></i>
                        <span class="sr-only">이전</span>
                    </button>
                </div>
            </header>
            <div class="sub-wrap has-header">
                <div class="randing-wrap">
                    <div class="line-step-wrapper">
                        <div class="line-step"></div>
                        <div class="line-step"></div>
                        <div class="line-step is-active"></div>
                        <div class="line-step"></div>
                    </div>

                    <div class="title-type__sub">
                        <h3 class="text-h5">
                            카카오톡 간편인증
                            <br />
                            정보를 입력해주세요
                        </h3>
                    </div>
                    <div class="auth-wrapper">
                        <div class="input-cell">
                            <div class="label">이름</div>
                            <div class="input-box">
                                <input
                                    type="text"
                                    class="input"
                                    placeholder="이름을 입력해주세요"
                                />
                            </div>
                        </div>
                        <div class="input-cell">
                            <div class="label">주민등록번호</div>
                            <div class="input-wrapper grid-half-num">
                                <div class="input-box">
                                    <input
                                        type="number"
                                        class="input"
                                        placeholder=""
                                    />
                                </div>
                                <i class="ico-hyphen">-</i>
                                <div class="input-group">
                                    <input
                                        type="password"
                                        class="input"
                                        placeholder="뒤 7자리"
                                    />
                                </div>
                            </div>
                        </div>
                        <div class="input-wrapper grid-1-3">
                            <div class="input-cell">
                                <div class="label">통신사</div>
                                <div
                                    class="line-select"
                                    onclick="openModal(event)"
                                    modal-id="modalAuthList"
                                >
                                    통신사
                                </div>
                            </div>
                            <div class="input-cell">
                                <div class="label">휴대폰번호</div>
                                <div class="input-box">
                                    <input
                                        type="number"
                                        class="input"
                                        placeholder="01041**98**"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="term-wrapper bottom-fixed">
                    <div class="term-title">
                        <button type="button" class="checkFormCir"></button>
                        <p>(필수)개인정보 제3자 제공동의</p>
                    </div>
                    <span class="hc1 text-c-lg-m">내용보기</span>
                </div>
            </div>
            <div class="bottom-button-fixed">
                <!-- 체크전 비활성화
                <button type="button" class="btn-fill btn-disabled">
                    <strong>다음</strong>
                </button> -->
                <button
                    type="button"
                    class="btn-fill btn-primary"
                    onclick="openModal(event)"
                    modal-id="modalAuthNext"
                >
                    <strong>다음</strong>
                </button>
            </div>
        </div>
        <!-- 하단 슬라이드 모달 : 통신사 -->
        <div class="modal-overlay modal-bottom" id="modalAuthList">
            <div class="modal-content">
                <div class="modal-body">
                    <div class="radiobx-wrap text-type">
                        <label
                            class="radio-item"
                            onclick="closeModal('modalAuthList')"
                        >
                            <input type="radio" name="status" checked />
                            <span class="box">KT</span>
                        </label>
                        <label
                            class="radio-item"
                            onclick="closeModal('modalAuthList')"
                        >
                            <input type="radio" name="status" />
                            <span class="box">SKT</span>
                        </label>
                        <label
                            class="radio-item"
                            onclick="closeModal('modalAuthList')"
                        >
                            <input type="radio" name="status" />
                            <span class="box">U+</span>
                        </label>
                        <label
                            class="radio-item"
                            onclick="closeModal('modalAuthList')"
                        >
                            <input type="radio" name="status" />
                            <span class="box">KT 알뜰폰</span>
                        </label>
                        <label
                            class="radio-item"
                            onclick="closeModal('modalAuthList')"
                        >
                            <input type="radio" name="status" value="none" />
                            <span class="box">SKT 알뜰폰</span>
                        </label>
                        <label
                            class="radio-item"
                            onclick="closeModal('modalAuthList')"
                        >
                            <input type="radio" name="status" value="none" />
                            <span class="box">U+ 알뜰폰</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <!-- 하단 슬라이드 모달 : 인증진행 -->
        <div class="modal-overlay modal-bottom" id="modalAuthNext">
            <div class="modal-content">
                <div class="modal-body">
                    <div class="auth-next">
                        <i class="ico-kakao"></i>

                        <h6 class="text-h6">
                            선택하신 간편인증 앱에서
                            <br />
                            인증을 진행해주세요
                        </h6>
                        <p class="text-b-sm-r">
                            인증 요청 푸시 메시지를 클릭해서 인증 완료 후
                            <br />
                            하단 간편인증 완료 버튼을 클릭해주세요
                        </p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button
                        type="button"
                        class="btn-fill btn-primary"
                        onclick="closeModal('modalAuthNext')"
                    >
                        인증 완료
                    </button>
                    <button
                        type="button"
                        class="btn-bor no-bor"
                        onclick="closeModal('modalAuthNext')"
                    >
                        취소
                    </button>
                </div>
            </div>
        </div>
        <script>
            const targetChks = document.querySelectorAll(".checkFormCir");
            targetChks.forEach((tg) => {
                tg.addEventListener("click", (e) => {
                    e.currentTarget.parentElement.classList.toggle(
                        "is-selected",
                    );
                });
            });

            const btnTg = document.querySelector(".btn-tg");
            const targetOverlay = document.querySelector(
                ".health-target-overlay",
            );
            btnTg.addEventListener("click", () => {
                targetOverlay.classList.toggle("is-active");
            });
        </script>
        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
