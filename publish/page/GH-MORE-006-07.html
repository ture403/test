<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>진료내역 불러오기 완료</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <div class="common-wrap">
            <header>
                <div class="top-header-nav">
                    <button type="button" class="btn-back">
                        <i class="ico-back"></i>
                        <span class="sr-only">이전</span>
                    </button>
                </div>
            </header>
            <div class="sub-wrap has-header">
                <div class="randing-wrap loading-data">
                    <!-- 완료 이미지 -->
                    <div class="loading-img-wrapper is-complete"></div>
                    <!-- 안내 텍스트  -->
                    <div class="loading-text-wrap">
                        <h5 class="text-h5">건강정보를 모두 가져왔어요</h5>
                        <p class="loading-text">
                            이제 하단의
                            <strong>AI 건강 분석 시작</strong>
                            버튼으로
                            <br />
                            나만의 맞춤형 건강 분석 결과를 확인해보세요
                            <br />
                            더 정확하고 개인화된 건강 관리가 가능해요!
                        </p>
                    </div>
                    <!-- 불러오는 데이터리스트 -->
                    <div class="auth-loading-wrap">
                        <div class="loading-item is-completed">
                            <div class="circle"></div>
                            <div class="text">병의원 진료내역</div>
                        </div>
                        <div class="loading-item is-completed is-last">
                            <div class="circle"></div>
                            <div class="text">건강검진 결과</div>
                        </div>
                    </div>
                    <!-- 불러오는 데이터리스트 1개-->
                    <div class="auth-loading-wrap">
                        <div class="loading-item is-completed is-last">
                            <div class="circle"></div>
                            <div class="text">건강검진 결과</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bottom-button-fixed">
                <button type="button" class="btn-fill btn-primary">
                    <strong>AI 건강 분석 시작</strong>
                </button>
            </div>
        </div>

        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
