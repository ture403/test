<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>루틴 최초안내페이지</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <div class="common-wrap routine-on">
            <div class="sub-wrap">
                <div class="onboard-tit">
                    <h3 class="text-h3">
                        영양제와 건기식
                        <br />
                        <span>왜 그동안 효과가 없었을까요?</span>
                    </h3>
                    <p>
                        옳지않은 식습관 위에 영양제만
                        <br />
                        추가한다면 아무런 의미가 없습니다.
                    </p>
                    <p>
                        니오와 함께 건강한 습관부터 만들어
                        <br />
                        내가 구매한 제품의 효과를 100% 발휘해보세요.
                    </p>
                </div>
                <div class="bottom-button-fixed trans">
                    <button type="button" class="btn-fill btn-primary">
                        <!--trans class삭제-->
                        <strong>루틴 시작하기</strong>
                    </button>
                </div>
            </div>
        </div>

        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
