        <!-- 하단 슬라이드 모달 -->
        <div class="modal-overlay modal-bottom is-active" id="modalBottom">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">루틴 실천 기록</h2>
                    <button
                        class="modal-close"
                        onclick="closeModal('modalBottom')"
                    >
                        <i class="ico-x"></i>
                        <span class="sr-only">닫기</span>
                    </button>
                </div>
                <div class="modal-body">
                    <!-- 루틴 -->
                    <div class="calendar" data-type="routine">
                        <div class="calendar-header">
                            <button class="prev-btn">
                                <i class="ico-prev"></i>
                                <span class="sr-only">이전</span>
                            </button>
                            <button class="calendar-title">
                                <span class="year-month"></span>
                                <i class="icon-arrow"></i>
                            </button>
                            <button class="next-btn">
                                <i class="ico-next"></i>
                                <span class="sr-only">다음</span>
                            </button>
                        </div>

                        <div class="calendar-weekdays"></div>
                        <div class="calendar-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
        <script type="module">
            import { createCalendarCore } from "../../utils/calendar.core.js"; // 경로 주의!

            window.addEventListener("load", function () {
                const container = document.querySelector(
                    '.calendar[data-type="routine"]',
                );

                if (container) {
                    createCalendarCore({
                        container: container,
                        type: "routine",
                        routineData: {
                            "2026-03-01": 10, // 오늘 날짜(3월) 기준으로 넣어야 보입니다.
                            "2026-03-13": 100, // 현재 날짜 기준 예시
                            "2026-03-14": 50,
                            "2026-02-18": 100, // 2월 데이터
                            "2026-02-19": 80,
                        },
                    });
                }
            });
        </script>
        <script src="../../utils/plugin/dayjs.min.js"></script>
        <script src="../../utils/plugin/weekday.js"></script>
        <script src="../../utils/plugin/isoWeek.js"></script>
        <script src="../../utils/plugin/isToday.js"></script>
