<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>걸음수</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <div class="common-wrap">
            <header>
                <div class="top-header-nav">
                    <button type="button" class="btn-back">
                        <i class="ico-back"></i>
                        <span class="sr-only">이전</span>
                    </button>
                    <h2>걸음 수</h2>
                </div>
            </header>

            <div class="sub-wrap has-header">
                <div class="health-sect1">
                    <!-- 1 -->
                    <div class="health-sect1-info">
                        <div class="health-infobx walk">
                            <h3>
                                <i class="ico-goal"></i>
                                <span class="text-b-md-sb">
                                    하루 목표 걸음 수
                                </span>
                            </h3>
                            <div class="health-data-wrap">
                                <div class="weight">
                                    <span class="text-h1">15,000</span>
                                    <span class="text-h6">걸음</span>
                                </div>
                                <button type="button" class="pen-edit">
                                    <i class="ico-edit"></i>
                                    <span class="sr-only">걸음수 입력</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tab-wrap">
                    <ul class="tab">
                        <li class="active">
                            <button type="button">1주</button>
                        </li>
                        <li><button type="button">1개월</button></li>
                        <li><button type="button">3개월</button></li>
                        <li><button type="button">6개월</button></li>
                        <li><button type="button">1년</button></li>
                    </ul>
                </div>
                <div class="health-sect2">
                    <div class="calendar-header-week">
                        <button type="button" class="nav-btn">
                            <i class="ico-prev"></i>
                            <span class="sr-only">이전</span>
                        </button>
                        <h3 class="header-title">02.16 ~ 02.22</h3>
                        <button type="button" class="nav-btn">
                            <i class="ico-next"></i>
                            <span class="sr-only">다음</span>
                        </button>
                    </div>
                    <div class="health-sect2-info">
                        <div class="health-sect2-info-detail">
                            <div class="text-b-md-sb hc3">총 걸음수</div>
                            <div class="dt-data">
                                <span class="text-h1">45,233</span>
                            </div>
                            <div class="dt-data-bg">
                                <div class="text-b-sm-m">
                                    <span class="hc3">일평균</span>
                                    <span class="hc3">11,796</span>
                                </div>
                            </div>
                        </div>
                        <div class="graph">
                            <img
                                src="../../assets/images/graph4.png"
                                alt="그래프 영역"
                            />
                        </div>
                        <div class="btn-goal-wrap">
                            <button type="button" class="btn-goal">
                                <img
                                    src="../../assets/images/ico-dotdot.svg"
                                    alt="...."
                                />
                                <span class="text-b-sm-r">목표</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="health-sect3">
                    <div class="card-history-wp is-first">
                        <!--child 속성제거, is-first클래스 추가-->
                        <!--클래스분리-->
                        <div class="card-date">오늘 (화)</div>
                        <div class="card-history">
                            <div class="info">
                                <div class="info-data">
                                    <span class="text-h7">6,294</span>
                                    <span class="text-h7">걸음</span>
                                </div>
                                <div>
                                    <span class="tag-d">345 kcal</span>
                                    <span class="tag-c">1,245m</span>
                                </div>
                            </div>
                            <div class="ctrl">
                                <div class="icon">
                                    <i class="ico-goal-sucess"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-history-wp">
                        <div class="card-date">어제 (월)</div>
                        <div class="card-history">
                            <div class="info">
                                <div class="info-data">
                                    <span class="text-h7">6,294</span>
                                    <span class="text-h7">걸음</span>
                                </div>
                                <div>
                                    <span class="tag-d">345 kcal</span>
                                    <span class="tag-c">1,245m</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!----260206 더보기버튼 삭제 ----->
                </div>
            </div>
        </div>

        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
