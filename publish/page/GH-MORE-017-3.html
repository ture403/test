<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>운동 - 자주입력</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        </script>
    </head>
    <body>
    <!-- 전체 화면 모달 -->
    <div class="modal-overlay modal-fullscreen is-active" id="modalFullscreen">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"></h2>
                <button class="modal-close" onclick="closeModal('modalFullscreen')"><i class="ico-x"></i><span class="sr-only">닫기</span></button>
            </div>
            <div class="modal-body">
                <div class="modal-body-cont">
                    <div class="title-type">
                        <h3 class="text-h5">어떤 운동을 하셨나요?</h3>
                    </div>
                    <div class="tab-wrap">
                        <div class="tab">
                            <div class="switch-tab-group">
                                <button class="switch-tab" onclick="switchTab(0)">직접 입력</button>
                                <button class="switch-tab active" onclick="switchTab(1)">자주입력</button>
                            </div>
                        </div>
                    </div>
                    <div class="radiobx-wrap">
                        <label class="radio-item">
                            <input type="radio" name="sample01">
                            <span class="box"><i class="ico-h-walk"></i>걷기 / 30분</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="sample01">
                            <span class="box"><i class="ico-h-indoor"></i>실내자전거 / 30분</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="sample01">
                            <span class="box"><i class="ico-h-run"></i>달리기 / 30분</span>
                        </label>
                        <!-- 자주입력은 3항목까지만 노출
                        <label class="radio-item">
                            <input type="radio" name="sample01">
                            <span class="box"><i class="ico-h-stairs"></i>달리기 / 30분</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="sample01">
                            <span class="box"><i class="ico-h-bicycle"></i>달리기 / 30분</span>
                        </label>
                         -->
                    </div>
                    <ul class="link-arr-lists">
                        <li>
                            <div class="link-arr" >
                                <div class="tit">
                                    <i class="ico-date2"></i>
                                    <span class="text-b-lg-sb">날짜</span>
                                </div>
                                <span class="text-b-lg-sb hc1">오늘</span>
                                <i class="ico-arr"></i>
                            </div>
                        </li>
                        <li>
                            <div class="link-arr" >
                                <div class="tit">
                                    <i class="ico-clock2"></i>
                                    <span class="text-b-lg-sb">기록시간</span>
                                </div>
                                <span class="text-b-lg-sb hc1">오후 2:32</span>
                                <i class="ico-arr"></i>
                            </div>
                        </li>
                        
                    </ul>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-fill  btn-disabled"><!--입력시 활성화 btn-primary로 변경-->
                    <strong>저장</strong>
                </button>
                
            </div>
        </div>
    </div>
    <script type="module">
        import { createWheel } from '../../utils/wheelpicker.js';

        const weightInteger = createWheel({
            container: document.getElementById('integer'),
            min: 30,
            max: 200,
            initialValue: 60,
            step: 1
        });

        const weightDecimal = createWheel({
            container: document.getElementById('decimals'),
            min: 0,
            max: 9,
            initialValue: 1,
            step: 1
        });

        function getWeight() {
        return `${weightInteger.getValue()}.${weightDecimal.getValue()}`;
        }
    </script>
    </body>
</html>
