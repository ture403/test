<!doctype html>
<html lang="ko">

                            <div class="bar"></div>
                            <div class="health-sect2-info-detail">
                                <div class="text-b-md-sb hc3">이완기 평균</div>

                    <div class="card-history-wp is-first">

                                    <span class="tx tc1">먹었어요</span>
                                </div>
                            </div>
                            <div class="info">
                                <div class="info-data">
                                    <span class="text-h7">

                    </div>
                    <div class="card-history-wp">

                                </div>
                            </div>
                            <div class="info">
                                <div class="info-data">
                                    <span class="text-h7">
                                        121-130 / 79-82 mmHg
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-history-wp">
                        <div class="card-date">02.20 ~ 02.26</div>
                        <div class="card-history">
                            <div class="icon">
                                <div class="pill-icon">
                                    <i class="pill-taken"></i>
                                    <span class="tx tc1">먹었어요</span>
                                </div>
                            </div>
                            <div class="info">
                                <div class="info-data">
                                    <span class="text-h7">
                                        121-130 / 79-82 mmHg
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!----260206 더보기버튼 삭제 ----->
                </div>
            </div>
            <div class="bottom-button-fixed">
                <button type="button" class="btn-fill btn-primary">
                    <strong>혈압 기록하기</strong>
                </button>
            </div>
        </div>
        <!-- 하단 슬라이드 모달 : 혈압약 여부 -->
        <div class="modal-overlay modal-bottom" id="modalBottom">
            <div class="modal-content">
                <div class="modal-body">
                    <div class="radiobx-wrap text-type">
                        <label
                            class="radio-item"
                            onclick="closeModal('modalBottom')"
                        >
                            <input
                                type="radio"
                                name="status"
                                value="done"
                                checked
                            />
                            <span class="box">복용 완료</span>
                        </label>
                        <label
                            class="radio-item"
                            onclick="closeModal('modalBottom')"
                        >
                            <input type="radio" name="status" value="yet" />
                            <span class="box">미복용</span>
                        </label>
                        <label
                            class="radio-item"
                            onclick="closeModal('modalBottom')"
                        >
                            <input type="radio" name="status" value="none" />
                            <span class="box">해당 없음</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
