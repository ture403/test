<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>혈당 입력</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <!-- 전체 화면 모달 -->
        <div
            class="modal-overlay modal-fullscreen is-active"
            id="modalFullscreen"
        >
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title"></h2>
                    <button
                        class="modal-close"
                        onclick="closeModal('modalFullscreen')"
                    >
                        <i class="ico-x"></i>
                        <span class="sr-only">닫기</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="modal-body-cont">
                        <div class="title-type">
                            <h3 class="text-h5">혈당을 입력해주세요</h3>
                        </div>
                        <!--- 혈당 wheelpicker---->
                        <div class="wheel-picker-wrapper">
                            <div class="highlight-bar">
                                <div></div>
                            </div>
                            <div class="picker-columns">
                                <div class="wheel-column" id="bl-sugar">
                                    <div class="wheel-items"></div>
                                </div>
                                <div class="unit-label w-onewy">mmHg</div>
                            </div>
                        </div>
                        <div class="title-type middle">
                            <h3 class="text-h6">언제 측정하셨나요?</h3>
                        </div>
                        <!-- 라디오 리스트 (태그 디자인) -->
                        <div class="radiobx-wrap tag-type">
                            <label class="radio-item">
                                <input type="radio" name="when_measure" />
                                <span class="box">
                                    <i class="ico-meal"></i>
                                    공복에
                                </span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="when_measure" />
                                <span class="box">
                                    <i class="ico-meal"></i>
                                    식전에
                                </span>
                            </label>
                            <label class="radio-item">
                                <input
                                    type="radio"
                                    name="when_measure"
                                    checked
                                />
                                <span class="box">
                                    <i class="ico-meal"></i>
                                    식후에 (2시간 이내)
                                </span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="when_measure" />
                                <span class="box">
                                    <i class="ico-sun"></i>
                                    평상시에
                                </span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="when_measure" />
                                <span class="box">
                                    <i class="ico-moon"></i>
                                    취침 전에
                                </span>
                            </label>
                        </div>
                        <ul class="link-arr-lists">
                            <li>
                                <div class="link-arr">
                                    <div class="tit">
                                        <i class="ico-date2"></i>
                                        <span class="text-b-lg-sb">날짜</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">오늘</span>
                                    <i class="ico-arr"></i>
                                </div>
                            </li>
                            <li>
                                <div class="link-arr">
                                    <div class="tit">
                                        <i class="ico-clock2"></i>
                                        <span class="text-b-lg-sb">
                                            기록시간
                                        </span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">
                                        오후 2:32
                                    </span>
                                    <i class="ico-arr"></i>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-fill btn-primary">
                        <strong>저장</strong>
                    </button>
                </div>
            </div>
        </div>
        <script type="module">
            import { createWheel } from "../../utils/wheelpicker.js";

            createWheel({
                container: document.getElementById("bl-sugar"),
                min: 0,
                max: 100,
                initialValue: 80,
                step: 1,
                onChange: (val) => {
                    console.log("혈당:", val);
                },
            });
        </script>
    </body>
</html>
