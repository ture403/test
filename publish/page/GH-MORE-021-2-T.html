<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>몸무게</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <!-- 전체 화면 모달 -->
        <div
            class="modal-overlay modal-fullscreen is-active"
            id="modalFullscreen"
        >
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title"></h2>
                    <button
                        class="modal-close"
                        onclick="closeModal('modalFullscreen')"
                    >
                        <i class="ico-x"></i>
                        <span class="sr-only">닫기</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="modal-body-cont">
                        <div class="title-type">
                            <h3 class="text-h5">몸무게 정보를 입력해주세요</h3>
                        </div>
                        <ul class="link-arr-lists">
                            <li>
                                <!-- wheel picker -->
                                <div class="wheel-picker-wrapper">
                                    <div class="highlight-bar">
                                        <div></div>
                                        <div></div>
                                    </div>
                                    <div class="picker-columns">
                                        <div class="wheel-column" id="integer">
                                            <div class="wheel-items"></div>
                                        </div>
                                        <div class="dot">.</div>
                                        <div
                                            class="wheel-column decimal"
                                            id="decimals"
                                        >
                                            <div class="wheel-items"></div>
                                        </div>
                                        <div class="unit-label">kg</div>
                                    </div>
                                </div>
                                <!-- //wheel picker -->
                            </li>
                            <li>
                                <div class="link-arr">
                                    <div class="tit">
                                        <i class="ico-date2"></i>
                                        <span class="text-b-lg-sb">날짜</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">오늘</span>
                                    <i class="ico-arr"></i>
                                </div>
                            </li>
                            <li>
                                <div class="link-arr">
                                    <div class="tit">
                                        <i class="ico-clock2"></i>
                                        <span class="text-b-lg-sb">
                                            기록시간
                                        </span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">
                                        오후 2:32
                                    </span>
                                    <i class="ico-arr"></i>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-fill btn-primary">
                        <strong>추가</strong>
                    </button>
                </div>
            </div>
        </div>
        <script type="module">
            import { createWheel } from "../../utils/wheelpicker.js";

            const weightInteger = createWheel({
                container: document.getElementById("integer"),
                min: 30,
                max: 200,
                initialValue: 60,
                step: 1,
            });

            const weightDecimal = createWheel({
                container: document.getElementById("decimals"),
                min: 0,
                max: 9,
                initialValue: 1,
                step: 1,
            });

            function getWeight() {
                return `${weightInteger.getValue()}.${weightDecimal.getValue()}`;
            }
        </script>
    </body>
</html>
