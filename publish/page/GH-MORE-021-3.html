<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>몸무게</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <!-- 전체 화면 모달 -->
        <div
            class="modal-overlay modal-fullscreen is-active"
            id="modalFullscreen"
        >
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title"></h2>
                    <button
                        class="modal-close"
                        onclick="closeModal('modalFullscreen')"
                    >
                        <i class="ico-x"></i>
                        <span class="sr-only">닫기</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="modal-body-cont">
                        <div class="title-type">
                            <h3 class="text-h5">몸무게 정보를 입력해주세요</h3>
                        </div>
                        <ul class="link-arr-lists">
                            <li>
                                <a href="#" class="link-arr">
                                    <div class="tit">
                                        <i class="ico-date"></i>
                                        <span class="text-b-lg-sb">날짜</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">오늘</span>
                                    <i class="ico-arr"></i>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="link-arr">
                                    <div class="tit">
                                        <i class="ico-clock"></i>
                                        <span class="text-b-lg-sb">시간</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">
                                        오후 2:32
                                    </span>
                                    <i class="ico-arr"></i>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="link-arr">
                                    <div class="tit">
                                        <i class="ico-wht"></i>
                                        <span class="text-b-lg-sb">몸무게</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">60 kg</span>
                                    <i class="ico-arr"></i>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-fill btn-primary">
                        <strong>추가하기</strong>
                    </button>
                </div>
            </div>
        </div>

        <!-- wheel picker -->
        <div class="picker-modal-overlay">
            <div class="picker-modal-container">
                <div class="picker-header">
                    <h3>몸무게 선택</h3>
                </div>
                <div class="wheel-picker-wrapper">
                    <div class="highlight-bar">
                        <div></div>
                        <div></div>
                    </div>
                    <div class="picker-columns">
                        <div class="wheel-column" id="integer">
                            <div class="padding-dummy"></div>
                            <div class="wheel-item">30</div>
                            <div class="wheel-item active">31</div>
                            <div class="wheel-item">32</div>
                            <div class="padding-dummy"></div>
                        </div>
                        <div class="dot">.</div>
                        <div class="wheel-column" id="decimals">
                            <div class="padding-dummy"></div>
                            <div class="wheel-item decimal">1</div>
                            <div class="wheel-item decimal active">2</div>
                            <div class="wheel-item decimal">3</div>
                            <div class="padding-dummy"></div>
                        </div>
                        <div class="unit-label">kg</div>
                    </div>
                </div>
                <div class="picker-footer">
                    <button class="btn-bor" onClick="{onClose}">취소</button>
                    <button class="btn-fill btn-primary" onClick="{handleAdd}">
                        확인
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
