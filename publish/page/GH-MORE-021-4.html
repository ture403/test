<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>몸무게</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <!-- 전체 화면 모달 -->
        <div
            class="modal-overlay modal-fullscreen is-active"
            id="modalFullscreen"
        >
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title"></h2>
                    <button
                        class="modal-close"
                        onclick="closeModal('modalFullscreen')"
                    >
                        <i class="ico-x"></i>
                        <span class="sr-only">닫기</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="modal-body-cont">
                        <div class="title-type">
                            <h3 class="text-h5">몸무게 정보를 입력해주세요</h3>
                        </div>
                        <ul class="link-arr-lists">
                            <li>
                                <a href="#" class="link-arr">
                                    <div class="tit">
                                        <i class="ico-date"></i>
                                        <span class="text-b-lg-sb">날짜</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">오늘</span>
                                    <i class="ico-arr"></i>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="link-arr">
                                    <div class="tit">
                                        <i class="ico-clock"></i>
                                        <span class="text-b-lg-sb">시간</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">
                                        오후 2:32
                                    </span>
                                    <i class="ico-arr"></i>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="link-arr">
                                    <div class="tit">
                                        <i class="ico-wht"></i>
                                        <span class="text-b-lg-sb">몸무게</span>
                                    </div>
                                    <span class="text-b-lg-sb hc1">60 kg</span>
                                    <i class="ico-arr"></i>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-fill btn-primary">
                        <strong>추가하기</strong>
                    </button>
                </div>
            </div>
        </div>

        <!-- 중앙 모달 -->
        <div class="modal-overlay modal-center is-active" id="modalCenter">
            <div class="modal-content">
                <div class="calendar-top-info">
                    <p class="text-b-sm-m">날짜 선택</p>
                    <div class="title-type">
                        <h1 class="text-h1">선택한 날짜</h1>
                        <button type="button"><i class="ico-pen"></i></button>
                    </div>
                </div>

                <!-- 선택 -->
                <div class="calendar" data-type="select">
                    <div class="calendar-header">
                        <button class="calendar-title">
                            <span class="year-month"></span>
                            <span class="picker-arrow">▼</span>
                        </button>
                        <button class="prev-btn">
                            <i class="ico-arr"></i>
                            <span class="sr-only">이전</span>
                        </button>
                        <button class="next-btn">
                            <i class="ico-arr"></i>
                            <span class="sr-only">다음</span>
                        </button>
                    </div>
                    <div class="calendar-weekdays"></div>
                    <div class="calendar-grid"></div>
                </div>

                <div class="calendar-month-btns">
                    <button type="button" class="btn hc1">취소</button>
                    <button type="button" class="btn hc1">확인</button>
                </div>
            </div>
        </div>
        <script src="../../utils/plugin/dayjs.min.js"></script>
        <script src="../../utils/plugin/weekday.js"></script>
        <script src="../../utils/plugin/isoWeek.js"></script>
        <script src="../../utils/plugin/isToday.js"></script>
        <script type="module" src="../../utils/calendar_select.js"></script>
    </body>
</html>
