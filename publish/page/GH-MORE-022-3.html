<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>약 검색</title>
    <link rel="stylesheet" href="../../assets/styles/style.css" />

    <style>
      :root {
        /* 초기값 100vh, JS에서 실제 뷰포트 높이(px)로 업데이트 */
        --vh: 100vh;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        height: var(--vh);
        overflow: hidden;
        position: fixed; /* 고정 */
        top: 0; /* 추가 */
        left: 0; /* 추가 */
        width: 100%;
        background-color: #a01; /* 배경색을 맞춰서 흰 줄처럼 보이는 현상 방지 */
      }
      /* --- 디버깅 패널 스타일 (이미지 레이아웃 재현) --- */
      #debug-info {
        position: fixed;
        bottom: 0; /* 헤더 아래쪽 적당한 위치 */
        right: 0;
        z-index: 9999;
        background-color: rgba(13, 33, 49, 0.9); /* 이미지의 어두운 배경색 */
        color: #e0ac69; /* 이미지의 주황/금색 텍스트 */
        padding: 10px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.6;
        border: 1px solid red; /* 이미지의 빨간색 테두리 */
        pointer-events: none; /* 클릭 방해 금지 */
      }
      #debug-info hr {
        border: 0;
        border-top: 1px solid #777;
        margin: 5px 0;
      }
      .common-wrap {
        display: flex;
        flex-direction: column;
        height: var(--vh);
        width: 100%;
        overflow: hidden;
        position: fixed; /* 키보드 대응 시 레이아웃 고정에 유리 */
        top: 0;
        left: 0;
      }
    </style>

    <script type="module" src="../../utils/ui_common.js"></script>
    <script type="module">
      import { cardSwiper } from "../../utils/ui_swiper.js";
      cardSwiper();
    </script>
  </head>
  <body>
    <div id="debug-info">
      w-scroll: <span id="w-scroll">0</span><br />
      viewport-scroll: <span id="v-scroll">0</span>
      <hr />
      body-H: <span id="b-h">0</span><br />
      window-H: <span id="win-h">0</span><br />
      viewport-H: <span id="v-h">0</span>
    </div>

    <div class="common-wrap">
      <header>
        <div class="top-header-search">
          <button type="button" class="btn-back">
            <i class="ico-back"></i>
          </button>
          <input type="text" placeholder="약이나 영양제 이름을 검색할 수 있습니다." class="ipt" />
          <button type="button" class="btn-camera">
            <i class="ico-camera"></i>
          </button>
        </div>
      </header>

      <div class="sub-wrap has-header gray" id="scroll-area">
        <div class="gh-more22-wrap">
          <div>
            <h3 class="text-h6">구매 영양제 (스크롤 테스트용)</h3>
            <p>아래로 내려보며 수치를 확인하세요.</p>
          </div>
        </div>
      </div>
    </div>

    111 작성하신 스크립트에서 발생할 수 있는 잠재적인 오류(요소를 찾지 못할 경우의 예외 처리 등)를 방지하고, 성능을 위해 약간의 최적화를
    더한 수정본입니다. 특히 scroll-area 요소가 동적으로 생성되거나 HTML에 없을 경우 에러가 나지 않도록 처리했습니다. JavaScript
    <script>
      const getEl = (id) => document.getElementById(id);

      function updateDebugInfo() {
        const winH = window.innerHeight;
        const vH = window.visualViewport ? window.visualViewport.height : winH;
        const vOffset = window.visualViewport ? window.visualViewport.offsetTop : 0;

        // 1. 실제 보이는 영역만큼만 높이 설정
        document.documentElement.style.setProperty("--vh", `${vH}px`);

        // 2. 디버깅 수치 업데이트
        if (getEl("win-h")) getEl("win-h").innerText = Math.round(winH);
        if (getEl("v-h")) getEl("v-h").innerText = Math.round(vH);
        if (getEl("v-scroll")) getEl("v-scroll").innerText = Math.round(vOffset);

        // 3. 키보드가 올라왔을 때 브라우저 뷰포트 강제 고정
        if (vOffset !== 0) {
          window.scrollTo(0, 0);
        }
      }

      // --- [핵심 추가] 브라우저 바운스 및 강제 스크롤 방지 ---

      // 터치 이동 시 뷰포트가 위로 밀리는 현상 방지
      document.addEventListener(
        "touchmove",
        (e) => {
          // 키보드가 올라온 상태(vOffset > 0)에서
          // 실제 스크롤 영역(#scroll-area)이 아닌 곳을 터치하면 이벤트를 막음
          if (window.visualViewport && window.visualViewport.offsetTop > 0) {
            if (!e.target.closest("#scroll-area")) {
              e.preventDefault();
            }
          }
        },
        { passive: false },
      );

      // 스크롤 이벤트 발생 시 즉시 0으로 복구
      window.addEventListener("scroll", () => {
        if (window.visualViewport && window.visualViewport.offsetTop !== 0) {
          window.scrollTo(0, 0);
        }
      });

      // 비주얼 뷰포트 리스너
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", updateDebugInfo);
        window.visualViewport.addEventListener("scroll", updateDebugInfo);
      }

      window.addEventListener("load", updateDebugInfo);
      window.addEventListener("resize", updateDebugInfo);

      const scrollArea = document.getElementById("scroll-area");
      if (scrollArea) {
        scrollArea.addEventListener("scroll", updateDebugInfo);
      }
    </script>
  </body>
</html>
