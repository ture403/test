<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>약 검색</title>
    <link rel="stylesheet" href="../../assets/styles/style.css" />

    <style>
      :root {
        /* 초기값 100vh, JS에서 실제 뷰포트 높이(px)로 업데이트 */
        --vh: 100vh;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        /* 중요: 바디 전체 스크롤을 막아 키보드 대응 시 화면 밀림 방지 */
        height: var(--vh);
        overflow: hidden;
        position: fixed;
        width: 100%;
      }
      /* --- 디버깅 패널 스타일 (이미지 레이아웃 재현) --- */
      #debug-info {
        position: fixed;
        top: 200px; /* 헤더 아래쪽 적당한 위치 */
        right: 0;
        z-index: 9999;
        background-color: rgba(13, 33, 49, 0.9); /* 이미지의 어두운 배경색 */
        color: #e0ac69; /* 이미지의 주황/금색 텍스트 */
        padding: 10px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.6;
        border: 1px solid red; /* 이미지의 빨간색 테두리 */
        pointer-events: none; /* 클릭 방해 금지 */
      }
      #debug-info hr {
        border: 0;
        border-top: 1px solid #777;
        margin: 5px 0;
      }
      .common-wrap {
        display: flex;
        flex-direction: column;
        height: var(--vh);
        width: 100%;
        overflow: hidden;
        position: fixed; /* 키보드 대응 시 레이아웃 고정에 유리 */
        top: 0;
        left: 0;
      }
    </style>

    <script type="module" src="../../utils/ui_common.js"></script>
    <script type="module">
      import { cardSwiper } from "../../utils/ui_swiper.js";
      cardSwiper();
    </script>
  </head>
  <body>
    <div id="debug-info">
      w-scroll: <span id="w-scroll">0</span><br />
      viewport-scroll: <span id="v-scroll">0</span>
      <hr />
      body-H: <span id="b-h">0</span><br />
      window-H: <span id="win-h">0</span><br />
      viewport-H: <span id="v-h">0</span>
    </div>

    <div class="common-wrap">
      <header>
        <div class="top-header-search">
          <button type="button" class="btn-back">
            <i class="ico-back"></i>
          </button>
          <input type="text" placeholder="약이나 영양제 이름을 검색할 수 있습니다." class="ipt" />
          <button type="button" class="btn-camera">
            <i class="ico-camera"></i>
          </button>
        </div>
      </header>

      <div class="sub-wrap has-header gray" id="scroll-area">
        <div class="gh-more22-wrap">
          <div>
            <h3 class="text-h6">구매 영양제 (스크롤 테스트용)</h3>
            <p>아래로 내려보며 수치를 확인하세요.</p>
          </div>
        </div>
      </div>
    </div>

    작성하신 스크립트에서 발생할 수 있는 잠재적인 오류(요소를 찾지 못할 경우의 예외 처리 등)를 방지하고, 성능을 위해 약간의 최적화를 더한
    수정본입니다. 특히 scroll-area 요소가 동적으로 생성되거나 HTML에 없을 경우 에러가 나지 않도록 처리했습니다. JavaScript
    <script>
      // 1. 요소 선택 (null 체크를 위해 함수 밖에서 선언만 하거나 안에서 처리)
      const getEl = (id) => document.getElementById(id);

      function updateDebugInfo() {
        // 수치 계산
        const winH = window.innerHeight;
        const vH = window.visualViewport ? window.visualViewport.height : winH;
        const bH = document.body.scrollHeight;
        const wScroll = window.scrollY || document.documentElement.scrollTop;
        const vOffset = window.visualViewport ? window.visualViewport.offsetTop : 0;

        // 화면 업데이트 (요소가 존재할 때만 innerText 삽입)
        if (getEl("win-h")) getEl("win-h").innerText = Math.round(winH);
        if (getEl("v-h")) getEl("v-h").innerText = Math.round(vH);
        if (getEl("b-h")) getEl("b-h").innerText = bH;
        if (getEl("w-scroll")) getEl("w-scroll").innerText = Math.round(wScroll);
        if (getEl("v-scroll")) getEl("v-scroll").innerText = Math.round(vOffset);

        // CSS 변수 업데이트 (키보드 대응 핵심)
        document.documentElement.style.setProperty("--vh", `${vH}px`);

        // 키보드가 올라올 때 브라우저 기본 스크롤이 발생하여 레이아웃이 밀리는 것 방지
        if (vOffset > 0) {
          window.scrollTo(0, 0);
        }
      }

      // 2. 이벤트 바인딩
      window.addEventListener("load", updateDebugInfo);
      window.addEventListener("resize", updateDebugInfo);
      window.addEventListener("scroll", updateDebugInfo);

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", updateDebugInfo);
        window.visualViewport.addEventListener("scroll", updateDebugInfo);
      }

      // 3. 내부 영역 스크롤 시 업데이트 (요소 존재 여부 확인 후 바인딩)
      const scrollArea = document.getElementById("scroll-area");
      if (scrollArea) {
        scrollArea.addEventListener("scroll", updateDebugInfo);
      }
    </script>
  </body>
</html>
