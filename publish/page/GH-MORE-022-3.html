<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>약 검색</title>
    <link rel="stylesheet" href="../../assets/styles/style.css" />

    <style>
      body {
        min-height: auto;
      }
      /* --- 디버깅 패널 스타일 (이미지 레이아웃 재현) --- */
      #debug-info {
        position: fixed;
        top: 200px; /* 헤더 아래쪽 적당한 위치 */
        right: 0;
        z-index: 9999;
        background-color: rgba(13, 33, 49, 0.9); /* 이미지의 어두운 배경색 */
        color: #e0ac69; /* 이미지의 주황/금색 텍스트 */
        padding: 10px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.6;
        border: 1px solid red; /* 이미지의 빨간색 테두리 */
        pointer-events: none; /* 클릭 방해 금지 */
      }
      #debug-info hr {
        border: 0;
        border-top: 1px solid #777;
        margin: 5px 0;
      }
    </style>

    <script type="module" src="../../utils/ui_common.js"></script>
    <script type="module">
      import { cardSwiper } from "../../utils/ui_swiper.js";
      cardSwiper();
    </script>
  </head>
  <body>
    <div id="debug-info">
      w-scroll: <span id="w-scroll">0</span><br />
      viewport-scroll: <span id="v-scroll">0</span>
      <hr />
      body-H: <span id="b-h">0</span><br />
      window-H: <span id="win-h">0</span><br />
      viewport-H: <span id="v-h">0</span>
    </div>

    <div class="common-wrap">
      <header>
        <div class="top-header-search">
          <button type="button" class="btn-back">
            <i class="ico-back"></i>
          </button>
          <input type="text" placeholder="약이나 영양제 이름을 검색할 수 있습니다." class="ipt" />
          <button type="button" class="btn-camera">
            <i class="ico-camera"></i>
          </button>
        </div>
      </header>

      <div class="sub-wrap has-header gray" id="scroll-area">
        <div class="gh-more22-wrap">
          <div>
            <h3 class="text-h6">구매 영양제 (스크롤 테스트용)</h3>
            <p>아래로 내려보며 수치를 확인하세요.</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const debugEls = {
        wScroll: document.getElementById("w-scroll"),
        vScroll: document.getElementById("v-scroll"),
        bodyH: document.getElementById("b-h"),
        winH: document.getElementById("win-h"),
        vH: document.getElementById("v-h"),
      };

      function updateDebugInfo() {
        // 수치 계산
        const winH = window.innerHeight;
        const vH = window.visualViewport ? window.visualViewport.height : winH;
        const bH = document.body.scrollHeight;
        const wScroll = window.scrollY || document.documentElement.scrollTop;
        const vScroll = window.visualViewport ? window.visualViewport.offsetTop : 0;

        // 화면 업데이트
        debugEls.winH.innerText = Math.round(winH);
        debugEls.vH.innerText = Math.round(vH);
        debugEls.bodyH.innerText = bH;
        debugEls.wScroll.innerText = Math.round(wScroll);
        debugEls.vScroll.innerText = Math.round(vScroll);

        // CSS 변수 업데이트 (키보드 대응)
        document.documentElement.style.setProperty("--vh", `${vH}px`);
      }

      // 이벤트 바인딩
      window.addEventListener("load", updateDebugInfo);
      window.addEventListener("resize", updateDebugInfo);
      window.addEventListener("scroll", updateDebugInfo);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", updateDebugInfo);
        window.visualViewport.addEventListener("scroll", updateDebugInfo);
      }

      // 내부 영역 스크롤 시에도 수치 업데이트
      document.getElementById("scroll-area").addEventListener("scroll", updateDebugInfo);
    </script>
  </body>
</html>
