        <!-- 중앙 모달 -->
        <div class="modal-overlay modal-center" id="modalCalender">
            <div class="modal-content">
                <div class="calendar-top-info">
                    <p class="text-b-sm-m">날짜 선택</p>
                    <div class="title-type">
                        <h1 class="text-h1">선택한 날짜</h1>
                        <button type="button"><i class="ico-pen"></i></button>
                    </div>
                </div>

                <!-- 선택 -->
                <div class="calendar" data-type="select">
                    <div class="calendar-header">
                        <button class="calendar-title">
                            <span class="year-month"></span>
                            <span class="picker-arrow">▼</span>
                        </button>
                        <button class="prev-btn">
                            <i class="ico-arr"></i>
                            <span class="sr-only">이전</span>
                        </button>
                        <button class="next-btn">
                            <i class="ico-arr"></i>
                            <span class="sr-only">다음</span>
                        </button>
                    </div>
                    <div class="calendar-weekdays"></div>
                    <div class="calendar-grid"></div>
                </div>

                <div class="calendar-month-btns">
                    <button
                        type="button"
                        class="btn hc1"
                        onclick="closeModal('modalCalender')"
                    >
                        취소
                    </button>
                    <button
                        type="button"
                        class="btn hc1"
                        onclick="closeModal('modalCalender')"
                    >
                        확인
                    </button>
                </div>
            </div>

        <script src="../../utils/plugin/dayjs.min.js"></script>

        <script type="module" src="../../utils/calendar_select.js"></script>
        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
