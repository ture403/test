<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>건강목표 선택</title>
        <link rel="stylesheet" href="../../assets/styles/style.css" />
        <script type="module" src="../../utils/ui_common.js"></script>
    </head>
    <body>
        <div class="common-wrap">
            <header>
                <div class="top-header-nav">
                    <button type="button" class="btn-back">
                        <i class="ico-back"></i>
                        <span class="sr-only">이전</span>
                    </button>
                </div>
            </header>
            <div class="sub-wrap has-header">
                <div class="health-target-wrap">
                    <div class="title-type">
                        <h3 class="text-h5">
                            안녕하세요
                            <br />
                            맞춤 관리를 위해 정보를 입력해주세요
                        </h3>
                    </div>
                    <div class="input-cell">
                        <div class="label">키</div>
                        <div class="input-group">
                            <input
                                type="number"
                                class="input"
                                placeholder="키를 입력해주세요"
                            />
                            <span class="unit">cm</span>
                        </div>
                    </div>
                    <!-- <div class="input-cell">
                        <div class="label">몸무게</div>
                        <div class="input-group">
                            <input
                                type="number"
                                class="input"
                                placeholder="몸무게를 입력해주세요"
                            />
                            <span class="unit">kg</span>
                        </div>
                    </div> -->
                    <div class="input-cell">
                        <div class="label">임신 여부</div>
                        <div class="radiobx-wrap list-type">
                            <label class="radio-item">
                                <input type="radio" name="sample01" />
                                <span class="box">해당 사항 없음</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="sample01" />
                                <span class="box">임신 초기</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="sample01" />
                                <span class="box">임신 중기</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="sample01" />
                                <span class="box">임신 말기</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bottom-button-fixed">
                <button type="button" class="btn-fill btn-disabled">
                    <strong>저장</strong>
                </button>
                <button type="button" class="btn-fill btn-primary">
                    <strong>저장</strong>
                </button>
            </div>
        </div>

        <script>
            const targetChks = document.querySelectorAll(".checkFormCir");
            targetChks.forEach((tg) => {
                tg.addEventListener("click", (e) => {
                    e.currentTarget.parentElement.classList.toggle(
                        "is-selected",
                    );
                });
            });

            const btnTg = document.querySelector(".btn-tg");
            const targetOverlay = document.querySelector(
                ".health-target-overlay",
            );
            btnTg.addEventListener("click", () => {
                targetOverlay.classList.toggle("is-active");
            });
        </script>

        <script>
            window.addEventListener("load", function () {
                var allElements = document.getElementsByTagName("*");
                Array.prototype.forEach.call(allElements, function (el) {
                    var includePath = el.dataset.includePath;
                    if (includePath) {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                el.outerHTML = this.responseText;
                            }
                        };
                        xhttp.open("GET", includePath, true);
                        xhttp.send();
                    }
                });
            });
        </script>
    </body>
</html>
